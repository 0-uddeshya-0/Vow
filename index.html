<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Michael & Dina are getting married — Friday, 18 September 2026, Ulm/Neu-Ulm." />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#F7F3EA" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23F7F3EA'/%3E%3Ccircle cx='32' cy='32' r='29.5' fill='none' stroke='%23BB9254'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Georgia,serif' font-style='italic' font-size='26' fill='%23485B3B'%3EM%26amp;D%3C/text%3E%3C/svg%3E" />
    <title>Michael &amp; Dina · 18. September 2026</title>
    <script>
      // Apply stored theme/language before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("vow.theme");
        if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
        var l = localStorage.getItem("vow.lang");
        if (l === "de" || l === "en") document.documentElement.lang = l;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
