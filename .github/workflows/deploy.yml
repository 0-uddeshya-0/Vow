# Deploys the site to GitHub Pages — MANUALLY triggered only.
name: Deploy to Pages

on:
  workflow_dispatch:
    inputs:
      base:
        description: "Vite base path (/ for the custom domain, /Vow/ for project pages)"
        required: true
        default: "/"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: ${{ inputs.base }}
          # Firebase web config — public by design; all security is in
          # firestore.rules / storage.rules. Analytics deliberately absent.
          VITE_FIREBASE_API_KEY: AIzaSyDBhm3hjvZ2lKGhJGc3QPpWBRBe5YoQL8M
          VITE_FIREBASE_AUTH_DOMAIN: vow-1809.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: vow-1809
          VITE_FIREBASE_STORAGE_BUCKET: vow-1809.firebasestorage.app
          VITE_FIREBASE_APP_ID: 1:696666654769:web:5996e05db90d4d06f0ad10
          # Web Push VAPID public key (Console → Cloud Messaging → Web Push
          # certificates). Public by design — it only lets the browser mint a
          # device token; sending still needs the private service-account key.
          VITE_FIREBASE_VAPID_KEY: I2dyoGDfMbjB2ozlouAtP_yK74P6cc8II8nppW0hq8w
      # Custom domain: only stamp CNAME into domain-rooted builds.
      - if: ${{ inputs.base == '/' }}
        run: echo "cannonfoundry.com" > dist/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
